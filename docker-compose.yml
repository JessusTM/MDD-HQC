services:
  backend:
    build: ./mdd-hqc-backend
    container_name: mdd-hqc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./mdd-hqc-backend/app:/app/app
      - ./mdd-hqc-backend/app/data:/app/data
    environment:
      OLLAMA_URL: "http://ollama:11434/api/generate"
    depends_on:
      - ollama
    networks:
      - appnet

  frontend:
    build: ./mdd-hqc-frontend
    container_name: mdd-hqc-frontend
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - ./mdd-hqc-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - appnet

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  ollama_data:
