name: CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdd-hqc-backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.3"

      - name: Install backend dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run backend lint checks
        run: uv run ruff check .

  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mdd-hqc-frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: mdd-hqc-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build React frontend
        run: npm run build

  build-and-publish-container-images:
    name: Build and publish container images
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend image
        uses: docker/build-push-action@v6
        with:
          context: ./mdd-hqc-backend
          push: true
          tags: ghcr.io/jessustm/mdd-hqc-backend:latest

      - name: Build and publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./mdd-hqc-frontend
          push: true
          tags: ghcr.io/jessustm/mdd-hqc-frontend:latest

  deploy-to-linux-server:
    name: Deploy to Linux server
    runs-on: ubuntu-latest
    needs: build-and-publish-container-images
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy production Docker Compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ~/MDD-HQC

      - name: Connect to server and deploy latest containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            mkdir -p ~/MDD-HQC
            cd ~/MDD-HQC
            docker login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_TOKEN"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
